server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Single-page app: route everything that is not a real file back to index.html
    # so client-side routing (react-router) works on deep links / refresh.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
