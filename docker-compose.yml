services:
  blogs-postgres:
    image: postgres:16-alpine
    container_name: blogs-postgres
    environment:
      POSTGRES_DB: blogs_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - blogs-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d blogs_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  blogs-service:
    build:
      context: ./services/blogs
    container_name: blogs-service
    depends_on:
      blogs-postgres:
        condition: service_healthy
    environment:
      DB_HOST: blogs-postgres
      DB_PORT: "5432"
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: blogs_db
    ports:
      - "8082:8082"

volumes:
  blogs-postgres-data:
