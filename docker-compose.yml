services:
  auth-postgres:
    image: postgres:16-alpine
    container_name: auth-postgres
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - auth-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d auth_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  authorization-service:
    build:
      context: ./services/authorization
    container_name: authorization-service
    depends_on:
      auth-postgres:
        condition: service_healthy
    environment:
      PORT: 3001
      DB_HOST: auth-postgres
      DB_PORT: 5432
      DB_NAME: auth_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: change-me
      ADMIN_EMAIL: admin@soa.local
      ADMIN_PASSWORD: admin123
      ADMIN_USERNAME: admin
    ports:
      - "3001:3001"
    command: sh -c "npm run db:init && npm run db:seed-admin && npm start"

  blogs-postgres:
    image: postgres:16-alpine
    container_name: blogs-postgres
    environment:
      POSTGRES_DB: blogs_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - blogs-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d blogs_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  blogs-service:
    build:
      context: ./services/blogs
    container_name: blogs-service
    depends_on:
      blogs-postgres:
        condition: service_healthy
      follower-service:
        condition: service_started
    environment:
      DB_HOST: blogs-postgres
      DB_PORT: "5432"
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: blogs_db
      AUTH_SERVICE_URL: http://authorization-service:3001
      FOLLOWER_SERVICE_URL: http://follower-service:8000
    ports:
      - "8082:8082"

  tour-mongo:
    image: mongo:7
    container_name: tour-mongo
    environment:
      MONGO_INITDB_DATABASE: tours_db
    ports:
      - "27017:27017"
    volumes:
      - tour-mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 5s
      retries: 10

  tours-service:
    build:
      context: ./services/tours
    container_name: tours-service
    restart: on-failure
    depends_on:
      tour-mongo:
        condition: service_healthy
    environment:
      PORT: 8083
      GRPC_PORT: 9093
      MONGO_URI: mongodb://tour-mongo:27017/tours_db
      JWT_SECRET: change-me
    ports:
      - "8083:8083"
  follower-neo4j:
    image: neo4j:5.26-community
    container_name: follower-neo4j
    environment:
      NEO4J_AUTH: neo4j/password123
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - follower-neo4j-data:/data
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p password123 'RETURN 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

  follower-service:
    build:
      context: ./services/follower
    container_name: follower-service
    depends_on:
      follower-neo4j:
        condition: service_healthy
    environment:
      NEO4J_URI: bolt://follower-neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: password123
      JWT_SECRET: change-me
    ports:
      - "8000:8000"

  gateway:
    build:
      context: ./services/gateway
    container_name: gateway
    depends_on:
      - authorization-service
      - blogs-service
      - tours-service
      - follower-service
    environment:
      TOURS_GRPC_ADDR: tours-service:9093
    ports:
      - "8080:80"

volumes:
  auth-postgres-data:
  blogs-postgres-data:
  tour-mongo-data:
  follower-neo4j-data:
