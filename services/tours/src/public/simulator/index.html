<!DOCTYPE html>
<html lang="sr">
  <head>
    <meta charset="UTF-8" />
    <title>Simulator pozicije</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <style>
      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; height: 100%; font-family: system-ui, sans-serif; }
      header {
        padding: 12px 16px;
        background: #1f2937;
        color: white;
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        align-items: center;
        justify-content: space-between;
      }
      header h1 { font-size: 18px; margin: 0; }
      .controls { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
      .controls input {
        padding: 6px 10px;
        border-radius: 4px;
        border: 1px solid #4b5563;
        background: #111827;
        color: white;
        min-width: 280px;
      }
      .controls button {
        padding: 6px 12px;
        background: #2563eb;
        border: none;
        color: white;
        border-radius: 4px;
        cursor: pointer;
      }
      .controls button:hover { background: #1d4ed8; }
      #status {
        padding: 8px 16px;
        background: #f3f4f6;
        border-bottom: 1px solid #d1d5db;
        font-size: 14px;
      }
      #status.error { background: #fee2e2; color: #991b1b; }
      #status.success { background: #dcfce7; color: #166534; }
      #map { height: calc(100% - 96px); width: 100%; }
    </style>
  </head>
  <body>
    <header>
      <h1>Simulator pozicije turiste</h1>
      <div class="controls">
        <input id="token" type="text" placeholder="Bearer JWT token (tourist role)" />
        <button id="load">Učitaj poziciju</button>
      </div>
    </header>
    <div id="status">Unesite JWT token, zatim kliknite na mapu da postavite trenutnu lokaciju.</div>
    <div id="map"></div>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script>
      const API_BASE = "/api/positions";
      const TOKEN_KEY = "tourist_simulator_token";

      const tokenInput = document.getElementById("token");
      const loadButton = document.getElementById("load");
      const statusEl = document.getElementById("status");

      const savedToken = localStorage.getItem(TOKEN_KEY);
      if (savedToken) tokenInput.value = savedToken;

      const map = L.map("map").setView([44.7866, 20.4489], 13);
      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        maxZoom: 19,
        attribution: "© OpenStreetMap contributors"
      }).addTo(map);

      let marker = null;

      function setStatus(message, kind) {
        statusEl.textContent = message;
        statusEl.className = kind || "";
      }

      function getToken() {
        const token = tokenInput.value.trim();
        if (!token) {
          setStatus("JWT token je obavezan.", "error");
          return null;
        }
        localStorage.setItem(TOKEN_KEY, token);
        return token;
      }

      function renderMarker(lat, lon) {
        if (marker) {
          marker.setLatLng([lat, lon]);
        } else {
          marker = L.marker([lat, lon]).addTo(map);
        }
        marker.bindPopup(`Lat: ${lat.toFixed(6)}<br>Lng: ${lon.toFixed(6)}`).openPopup();
        map.setView([lat, lon], Math.max(map.getZoom(), 14));
      }

      async function loadPosition() {
        const token = getToken();
        if (!token) return;

        try {
          const response = await fetch(`${API_BASE}/me`, {
            headers: { Authorization: `Bearer ${token}` }
          });

          if (response.status === 404) {
            setStatus("Trenutna lokacija još nije postavljena. Kliknite na mapu.", "");
            return;
          }

          if (!response.ok) {
            const body = await response.json().catch(() => ({}));
            throw new Error(body.message || `HTTP ${response.status}`);
          }

          const { position } = await response.json();
          renderMarker(position.latitude, position.longitude);
          setStatus(
            `Učitana lokacija: ${position.latitude.toFixed(6)}, ${position.longitude.toFixed(6)}`,
            "success"
          );
        } catch (err) {
          setStatus(`Greška pri učitavanju: ${err.message}`, "error");
        }
      }

      async function savePosition(lat, lon) {
        const token = getToken();
        if (!token) return;

        try {
          const response = await fetch(`${API_BASE}/me`, {
            method: "PUT",
            headers: {
              "Content-Type": "application/json",
              Authorization: `Bearer ${token}`
            },
            body: JSON.stringify({ latitude: lat, longitude: lon })
          });

          if (!response.ok) {
            const body = await response.json().catch(() => ({}));
            throw new Error(body.message || `HTTP ${response.status}`);
          }

          const { position } = await response.json();
          renderMarker(position.latitude, position.longitude);
          setStatus(
            `Lokacija sačuvana: ${position.latitude.toFixed(6)}, ${position.longitude.toFixed(6)}`,
            "success"
          );
        } catch (err) {
          setStatus(`Greška pri snimanju: ${err.message}`, "error");
        }
      }

      map.on("click", (e) => {
        savePosition(e.latlng.lat, e.latlng.lng);
      });

      loadButton.addEventListener("click", loadPosition);

      if (savedToken) loadPosition();
    </script>
  </body>
</html>
